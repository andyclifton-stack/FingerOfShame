<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Andy Clifton Fitness</title>
    <link rel="manifest" href="fitness-manifest.json">
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-orange: #f59e0b;
            --progress-bg: #334155;
            --nav-bg: #0f172a;
            --font-main: 'Outfit', sans-serif;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 100px;
        }

        /* --- Header --- */
        header {
            border-bottom: 1px solid var(--card-bg);
            padding-bottom: 15px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .lvl-badge {
            background: var(--card-bg);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--accent-blue);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        /* --- Navigation --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 100;
            padding-bottom: env(safe-area-inset-bottom, 15px);
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.3);
        }

        .nav-item {
            background: none;
            border: none;
            color: var(--text-muted);
            font-family: var(--font-main);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            opacity: 0.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 8px 24px;
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .nav-item.active {
            color: white;
            opacity: 1;
            background: var(--accent-blue);
            transform: translateY(-5px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .nav-icon {
            font-size: 1.4rem;
        }

        /* --- Cards --- */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        /* --- Forms --- */
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-label {
            display: block;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select,
        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--text-muted);
            background: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-main);
            font-size: 1rem;
            box-sizing: border-box;
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .checkbox-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* --- Buttons --- */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-family: var(--font-main);
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
            transition: transform 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background-color: var(--accent-blue);
            color: white;
        }

        .btn-green {
            background-color: var(--accent-green);
            color: white;
        }

        .btn-red {
            background-color: var(--accent-red);
            color: white;
        }

        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--text-muted);
            color: var(--text-main);
        }

        .btn-sm {
            padding: 8px 12px;
            font-size: 0.85rem;
            width: auto;
        }

        .btn-icon-only {
            width: 30px;
            height: 30px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 1.2rem;
            margin: 0;
        }

        .btn-link {
            background: none;
            border: none;
            color: var(--accent-blue);
            cursor: pointer;
            padding: 0;
            font-family: inherit;
            font-weight: 600;
            text-decoration: underline;
            font-size: 0.9rem;
            text-align: right;
        }

        /* --- History List --- */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 10px;
        }

        .history-item {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            border-left: 4px solid var(--text-muted);
        }

        .history-item.type-plan {
            border-color: var(--accent-blue);
        }

        .history-item.type-custom {
            border-color: var(--accent-orange);
        }

        .history-item.type-recovery {
            border-color: var(--accent-green);
        }

        .h-date {
            font-size: 0.8rem;
            color: var(--text-muted);
            min-width: 50px;
            padding-top: 2px;
        }

        .h-info {
            flex: 1;
        }

        .h-title {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .h-detail {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        /* --- Workout UI --- */
        .workout-image {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
            background-color: #000;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .segment-bar {
            display: flex;
            gap: 4px;
            margin-bottom: 15px;
            height: 6px;
            width: 100%;
        }

        .segment {
            flex: 1;
            background: var(--progress-bg);
            border-radius: 3px;
        }

        .segment.done {
            background: var(--accent-green);
        }

        .segment.active {
            background: var(--accent-blue);
            box-shadow: 0 0 8px var(--accent-blue);
        }

        .timer-wrapper {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 10px auto;
        }

        .timer-svg {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }

        .timer-circle-bg {
            fill: none;
            stroke: var(--progress-bg);
            stroke-width: 6;
        }

        .timer-circle-fg {
            fill: none;
            stroke-width: 6;
            stroke-linecap: round;
            stroke-dasharray: 565;
            stroke-dashoffset: 565;
            transition: stroke-dashoffset 1s linear, stroke 0.3s;
        }

        .timer-text-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .timer-big-num {
            font-size: 3rem;
            font-weight: 700;
            line-height: 1;
        }

        .mode-work .timer-circle-fg {
            stroke: var(--accent-green);
        }

        .mode-rest .timer-circle-fg {
            stroke: var(--accent-blue);
        }

        /* --- Controls Row --- */
        .controls-row {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            /* Back | Timer | Next */
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }

        /* --- Overlays --- */
        .full-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .full-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .countdown-text {
            font-size: 8rem;
            font-weight: 700;
            color: var(--accent-blue);
            transform: scale(0.5);
            opacity: 0;
        }

        .pulse-anim {
            animation: pulseNum 0.9s ease-out forwards;
        }

        .success-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(16, 185, 129, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
        }

        .animate-success .success-overlay {
            animation: flashGreen 1.2s ease forwards;
        }

        @keyframes pulseNum {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }

            50% {
                transform: scale(1.2);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 0;
            }
        }

        @keyframes flashGreen {
            0% {
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            80% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }

        /* --- Preview Modal --- */
        .preview-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 300;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .preview-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 480px;
            border-radius: 20px 20px 0 0;
            padding: 25px;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }

            to {
                transform: translateY(0);
            }
        }

        .preview-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .preview-row:last-child {
            border-bottom: none;
        }

        .preview-label {
            color: var(--text-main);
            font-weight: 500;
        }

        .preview-val {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* --- Utils --- */
        .hidden {
            display: none !important;
        }

        .fade-in {
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Forecast List */
        .forecast-box {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            text-align: left;
        }

        .forecast-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 8px;
            min-height: 24px;
        }

        .forecast-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        /* Progress Bar Wrapper */
        .dash-progress-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .dash-progress-container {
            flex: 1;
        }

        .dash-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        .dash-track {
            background: var(--progress-bg);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }

        .dash-fill {
            background: var(--accent-blue);
            height: 100%;
            width: 0%;
            transition: width 0.5s ease;
        }

        .up-next-box {
            background: rgba(59, 130, 246, 0.1);
            border-left: 3px solid var(--accent-blue);
            padding: 10px;
            margin: 15px 0;
            text-align: left;
            animation: fadeIn 0.5s;
        }

        details.instruction-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: left;
        }

        summary {
            cursor: pointer;
            color: var(--accent-blue);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
        }

        .media-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .est-time {
            font-size: 0.85rem;
            color: var(--accent-green);
            font-weight: 600;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

    <div id="countdownOverlay" class="full-overlay">
        <div id="countdownDisplay" class="countdown-text">3</div>
    </div>

    <div id="viewPreview" class="preview-modal hidden">
        <div class="preview-card">
            <h2 id="previewTitle" style="margin-top:0; color:var(--accent-blue);">Workout Preview</h2>
            <div id="previewContent"></div>
            <button class="btn btn-secondary" id="btnClosePreview" style="margin-top:20px;">Close</button>
        </div>
    </div>

    <div class="container">
        <header>
            <div>
                <h1>Andy Clifton Fitness</h1>
                <div class="subtitle" id="dateDisplay">Loading...</div>
            </div>
            <div class="lvl-badge">Level <span id="userLevelDisplay">1</span></div>
        </header>

        <div id="viewDashboard" class="screen fade-in">
            <div id="planProgressCard" class="hidden" style="margin: 15px 0;">
                <div class="dash-progress-wrapper">
                    <div class="dash-progress-container">
                        <div class="dash-labels"><span id="planNameLabel">No Plan</span><span
                                id="planProgressLabel">0%</span></div>
                        <div class="dash-track">
                            <div class="dash-fill" id="planProgressBar"></div>
                        </div>
                    </div>
                    <button class="btn btn-secondary btn-icon-only" id="btnResetProgress"
                        title="Reset Current Plan">↺</button>
                </div>
            </div>
            <div class="card text-center">
                <img id="dashImage" src="" class="workout-image" style="display:none;" alt="Dash">
                <h2 id="todayTitle" style="color: var(--accent-blue); margin-bottom:5px;">Loading...</h2>
                <p id="todayDesc" style="color: var(--text-muted); margin-top:0;">...</p>
                <div id="actionArea" style="margin-top:20px;"></div>

                <div id="forecastArea" class="forecast-box hidden">
                    <div style="font-weight:600; margin-bottom:10px; color:var(--accent-blue);">COMING UP</div>
                    <div id="forecastContent"></div>
                </div>
            </div>

            <div class="card" style="margin-top:15px; padding:15px; text-align:center;">
                <div style="display: flex; justify-content: space-around;">
                    <div class="text-center">
                        <div style="font-size:1.5rem; font-weight:700;" id="statPlan">0</div>
                        <div style="font-size:0.7rem; color:var(--text-muted);">PLAN WORKOUTS</div>
                    </div>
                    <div class="text-center">
                        <div style="font-size:1.5rem; font-weight:700;" id="statExtra">0</div>
                        <div style="font-size:0.7rem; color:var(--text-muted);">EXTRA ACTIVITY</div>
                    </div>
                </div>
                <div id="lastWorkoutLabel"
                    style="font-size:0.8rem; color:var(--text-muted); margin-top:12px; border-top:1px solid rgba(255,255,255,0.05); padding-top:10px; opacity: 0.8;">
                    No workouts yet
                </div>
            </div>

            <div id="resumeBanner" class="hidden" style="margin-top:15px;"><button class="btn btn-secondary"
                    id="btnResumeSession">⚠️ Resume interrupted session?</button></div>
        </div>

        <div id="viewTools" class="screen hidden fade-in">
            <button class="btn btn-secondary" id="btnNewPlan"
                style="margin-bottom:15px; border-color:var(--accent-blue); color:var(--accent-blue); border-width: 2px;">+
                Create New Workout Plan</button>

            <div class="card">
                <h3 style="margin-top:0;">Manual Session (Timer)</h3>
                <div class="form-group"><label class="form-label">Exercise Name</label><input type="text"
                        id="custExName" placeholder="e.g. Kettlebell Swings"></div>
                <div style="display:flex; gap:10px;">
                    <div class="form-group" style="flex:1"><label class="form-label">Work (Sec)</label><input
                            type="number" id="custWork" value="30"></div>
                    <div class="form-group" style="flex:1"><label class="form-label">Rest (Sec)</label><input
                            type="number" id="custRest" value="30"></div>
                    <div class="form-group" style="flex:1"><label class="form-label">Sets</label><input type="number"
                            id="custSets" value="5"></div>
                </div>
                <button class="btn btn-primary" id="btnStartCustom">Start Custom Timer</button>
            </div>

            <div class="card" style="margin-top:15px;">
                <h3 style="margin-top:0;">Quick Log (No Timer)</h3>
                <div class="form-group">
                    <label class="form-label">Activity Type</label>
                    <select id="quickType">
                        <option value="reps">Reps (e.g. Pushups)</option>
                        <option value="cardio">Cardio / Time (e.g. Bike)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Activity Name</label>
                    <input type="text" id="quickName" placeholder="e.g. Pushups">
                </div>

                <div id="quickInputReps" class="form-group">
                    <label class="form-label">Count</label>
                    <input type="number" id="quickCount" placeholder="e.g. 10">
                </div>

                <div id="quickInputCardio" class="hidden" style="display:flex; gap:10px;">
                    <div class="form-group" style="flex:1">
                        <label class="form-label">Minutes</label>
                        <input type="number" id="quickMins" placeholder="30">
                    </div>
                    <div class="form-group" style="flex:1">
                        <label class="form-label">Distance (Opt)</label>
                        <input type="text" id="quickDist" placeholder="e.g. 5km">
                    </div>
                </div>

                <button class="btn btn-green" id="btnLogQuick">Save to History</button>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; margin:20px 0 10px 0;">
                <h3 style="margin:0;">History</h3><button class="btn btn-sm btn-red" id="btnClearHistory"
                    style="width:auto; margin:0;">Clear Logs</button>
            </div>
            <div class="history-list" id="historyList">
                <div style="text-align:center; color:var(--text-muted); padding:20px;">No logs found.</div>
            </div>
        </div>

        <div id="viewWizard" class="screen card hidden fade-in">
            <img src="fitness_images/plan_wizard.png" class="workout-image" alt="Plan Builder"
                onerror="this.style.display='none'">
            <h2 style="margin-top:0">Create New Plan</h2>
            <div class="form-group"><label class="form-label">Difficulty Level</label><select id="wizLevel">
                    <option value="1">Foundation</option>
                    <option value="2">Standard</option>
                    <option value="3">Advanced</option>
                </select></div>
            <div class="form-group"><label class="form-label">Duration</label><select id="wizWeeks">
                    <option value="4">4 Weeks</option>
                    <option value="8">8 Weeks</option>
                </select></div>
            <div class="form-group"><label class="form-label">Equipment</label>
                <div class="checkbox-grid">
                    <label class="checkbox-item"><input type="checkbox" id="eq_db"> Dumbbells</label><label
                        class="checkbox-item"><input type="checkbox" id="eq_kb"> Kettlebells</label>
                    <label class="checkbox-item"><input type="checkbox" id="eq_bench"> Bench</label><label
                        class="checkbox-item"><input type="checkbox" id="eq_bar"> Pull Up Bar</label>
                    <label class="checkbox-item"><input type="checkbox" id="eq_bag"> Punch Bag</label><label
                        class="checkbox-item"><input type="checkbox" id="eq_cardio"> Cardio Machine</label>
                </div>
            </div>
            <button class="btn btn-primary" id="btnGenerate">Generate Plan</button>
            <button class="btn btn-secondary" id="btnCancelWiz">Cancel</button>
        </div>

        <div id="viewWorkout" class="screen card hidden fade-in">
            <div class="text-center est-time" id="workoutEstTime">~15 Mins Remaining</div>
            <div class="segment-bar" id="segmentBar"></div>
            <div class="success-overlay">
                <div style="font-size:5rem; color:white;">✓</div>
            </div>
            <div id="stepContent"></div>
        </div>

        <div id="viewComplete" class="screen card hidden text-center fade-in">
            <img src="fitness_images/session_done.png" class="workout-image" alt="Done">
            <h2 style="color:var(--accent-green)">Session Complete!</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                <button class="btn btn-secondary" onclick="logFeedback('Easy')">Easy</button>

        function runCountdown(callback) {

        function toggleTimer(work, rest, nextObj) {
            if (isTimerRunning) {
                clearInterval(timerInterval);

                document.getElementById('btnTimer').innerText = "Resume";
                playTone('tick');
                return;

            isTimerRunning = true;
            document.getElementById('btnTimer').innerText = "Pause";
            playTone('tick');
            updateFavicon('active');
            initAudio();

            timerInterval = setInterval(() => {
                timeRemaining--;
                document.getElementById('timerDisplay').innerText = timeRemaining;
                const total = currentPhase === 'work' ? work : rest;
                const offset = 565 - ((timeRemaining / total) * 565);
                document.getElementById('timerCircle').style.strokeDashoffset = offset;
                document.getElementById('timerLabel').innerText = currentPhase.toUpperCase();

                playTone('tick');

                if (timeRemaining <= 0) {

                        playTone('success');
                    }

        function playTone(type) {
            if (!audioCtx) initAudio();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'start') {
                osc.frequency.setValueAtTime(440, now); osc.frequency.exponentialRampToValueAtTime(880, now + 0.1);
                gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start(now); osc.stop(now + 0.5);
            } else if (type === 'tick') {
                osc.frequency.setValueAtTime(1000, now); gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                osc.start(now); osc.stop(now + 0.05);
            } else if (type === 'warn') {
                osc.frequency.setValueAtTime(600, now); gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'end') {
                osc.frequency.setValueAtTime(880, now); osc.frequency.exponentialRampToValueAtTime(440, now + 0.3);
                gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 1);
                osc.start(now); osc.stop(now + 1);
            } else if (type === 'success') {
                [523.25, 659.25, 783.99].forEach(freq => {
                    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    o.frequency.value = freq; g.gain.setValueAtTime(0.2, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
                    o.start(now); o.stop(now + 0.8);
                });
            }
        }

        function renderHistory() {

            if (!historyLogs || Object.keys(historyLogs).length === 0) {
                list.innerHTML = '<div style="text-align:center; color:var(--text-muted); padding:20px;">No logs found.</div>';
                return;
            }
            const logsArray = Object.entries(historyLogs).sort((a, b) => b[1].timestamp - a[1].timestamp).map(([key, val]) => {
                const date = new Date(val.timestamp);
                const day = date.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
                let typeClass = 'type-plan'; let title = "Plan Workout";
                let detail = val.summary ? val.summary : (val.difficulty ? `Rated: ${val.difficulty}` : "Completed");

                else if (val.type === 'recovery') { typeClass = 'type-recovery'; title = "Recovery Walk"; if (!val.summary) detail = "15 Minutes"; }
                else if (val.type === 'quick') { typeClass = 'type-custom'; title = "Quick Log"; detail = `${val.exercise}: ${val.summary}`; }
                return `<div class="history-item ${typeClass}"><div class="h-date">${day}</div><div class="h-info"><div class="h-title">${title}</div><div class="h-detail">${detail}</div></div></div>`;
            });
            list.innerHTML = logsArray.join('');
        }

        window.logFeedback = (diff) => {
            const timestamp = Date.now(); const dateKey = sessionMode === 'plan' ? new Date().toISOString().split('T')[0] : `custom_${timestamp}`; const updates = {};
            let summaryText = "";
            if (sessionMode === 'plan') {
                const exercises = [...new Set(workoutSteps.filter(s => s.type === 'work').map(s => s.title.replace(/Round \d+: /, '')))];
                const approxTime = Math.ceil(workoutSteps.reduce((acc, s) => acc + (s.time || 0) + (s.rest || 0), 0) / 60);
                summaryText = `~${approxTime} mins: ${exercises.join(', ')}`;
            } else { summaryText = `${customSessionData.sets} sets of ${customSessionData.name} (${customSessionData.work}s work / ${customSessionData.rest}s rest)`; }
            const logData = { completed: true, timestamp: timestamp, type: sessionMode, difficulty: diff, summary: summaryText };
            if (sessionMode === 'custom') logData.exercise = customSessionData.name;
            updates[`fitness/history/log_${timestamp}`] = logData;
            const db = getDatabase(); update(ref(db), updates).then(() => { isSessionActive = false; if (sessionMode === 'custom') { showScreen('viewTools'); updateNavState('navTools'); } else { location.reload(); } });
        };

        window.finishSimpleSession = () => {
            const timestamp = Date.now(); const updates = {}; updates[`fitness/history/walk_${timestamp}`] = { completed: true, type: 'recovery', timestamp: timestamp, summary: "15 Minute Recovery Walk" };
            const db = getDatabase(); update(ref(db), updates).then(() => location.reload());
        };

        function calculateProgress() {
            const title = document.getElementById('todayTitle'); const desc = document.getElementById('todayDesc'); const img = document.getElementById('dashImage'); const action = document.getElementById('actionArea'); const progressCard = document.getElementById('planProgressCard');
            const forecastArea = document.getElementById('forecastArea'); const forecastContent = document.getElementById('forecastContent');

            img.style.display = 'block';
            if (!activePlan) { title.innerText = "No Plan Active"; desc.innerText = "Create a plan to start your journey."; img.src = "fitness_images/plan_wizard.png"; action.innerHTML = `<button class="btn btn-primary" onclick="document.getElementById('viewWizard').classList.remove('hidden'); document.getElementById('viewDashboard').classList.add('hidden');">Get Started</button>`; progressCard.classList.add('hidden'); return; }

            progressCard.classList.remove('hidden');

            // --- NEW LOGIC: Hybrid Sequence ---

            // 1. Count "Plan" workouts completed
            const logs = Object.values(historyLogs);
            const planLogs = logs.filter(l => l.type === 'plan').sort((a, b) => b.timestamp - a.timestamp);
            const workoutsCompleted = planLogs.length;

            // 2. Identify Current State
            let showRecovery = false;
            let showWorkout = true; // Default

            if (planLogs.length > 0) {
                const lastLog = planLogs[0];
                const lastDate = new Date(lastLog.timestamp);
                lastDate.setHours(0, 0, 0, 0);

                const today = new Date();
                today.setHours(0, 0, 0, 0);

                const diffTime = Math.abs(today - lastDate);
                const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));

                if (diffDays === 0) {
                    // Done today
                    showWorkout = false;
                } else if (diffDays === 1) {
                    // Done yesterday -> Recovery Day
                    showRecovery = true;
                    showWorkout = false;
                } else {
                    // Done 2+ days ago -> Show Next Workout
                    showWorkout = true;
                }
            }

            // 3. Calculate "Virtual Day" for display
            // If 0 workouts done: Day 1.
            // If 1 workout done (and it's recovery day): Day 2.
            // If 1 workout done (and we skipped recovery): Day 3 (Next workout).

            let currentDayLabel = 1;
            if (workoutsCompleted > 0) {
                if (showRecovery) currentDayLabel = (workoutsCompleted * 2);
                else if (showWorkout) currentDayLabel = (workoutsCompleted * 2) + 1;
                else currentDayLabel = (workoutsCompleted * 2); // Completed state
            }

            const totalDays = activePlan.lengthWeeks * 7;
            const pct = Math.min(100, Math.floor((workoutsCompleted / (activePlan.lengthWeeks * 3)) * 100)); // Approx 3 workouts/week

            document.getElementById('planNameLabel').innerText = `${activePlan.title} Plan (Day ${currentDayLabel})`;
            document.getElementById('planProgressLabel').innerText = `${pct}%`;
            document.getElementById('planProgressBar').style.width = `${pct}%`;

            // 4. Render UI based on State
            if (!showWorkout && !showRecovery) {
                // COMPLETED TODAY
                title.innerText = "All Done!"; desc.innerText = "Great job! Rest up for tomorrow."; img.src = "fitness_images/session_done.png";
                action.innerHTML = `<button class="btn btn-secondary btn-sm" onclick="startGeneratedWorkout(${currentDayLabel})">Redo Session (Optional)</button>`;
                forecastArea.classList.remove('hidden');
                forecastContent.innerHTML = `
                <div class="forecast-row"><span>Tomorrow</span><span>Active Recovery</span></div>
                <div class="forecast-row"><span>Next Workout</span><button class="btn-link" onclick="openPreview(${currentDayLabel + 2})">Strength Workout ⓘ</button></div>
            `;
            }
            else if (showRecovery) {
                // RECOVERY DAY
                title.innerText = "Active Recovery"; desc.innerText = "15 Min Walk."; img.src = "fitness_images/active_walk.png";
                action.innerHTML = `<button class="btn btn-green" onclick="finishSimpleSession()">Log Walk</button><button class="btn btn-secondary btn-sm" onclick="startGeneratedWorkout(${currentDayLabel + 1})">Skip to Workout</button>`;
                forecastArea.classList.add('hidden');
            }
            else {
                // WORKOUT DAY
                title.innerText = "Workout Day"; desc.innerText = "Focus on form."; img.src = "fitness_images/dash_strength.png";
                // Note: pass currentDayLabel. Since math is (completed*2)+1, it will be 1, 3, 5, etc.
                // buildDailyWorkout maps Day 1,3,5 to similar workouts, so this works fine.
                action.innerHTML = `<button class="btn btn-primary" id="btnStartMain">Start Session</button>`;
                setTimeout(() => { if (document.getElementById('btnStartMain')) document.getElementById('btnStartMain').onclick = () => startGeneratedWorkout(currentDayLabel); }, 0);
                forecastArea.classList.add('hidden');
            }
        }

        function getDayType(d) { const cycle = (d - 1) % 7; if ([0, 2, 4].includes(cycle)) return "Strength Workout"; return "Rest / Active Recovery"; }

        function updateNavState(activeId) { document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active')); document.getElementById(activeId).classList.add('active'); }
        function updateFavicon(state) { const canvas = document.createElement('canvas'); canvas.width = 64; canvas.height = 64; const ctx = canvas.getContext('2d'); ctx.beginPath(); ctx.arc(32, 32, 32, 0, 2 * Math.PI); if (state === 'active') ctx.fillStyle = '#ef4444'; else if (state === 'rest') ctx.fillStyle = '#10b981'; else ctx.fillStyle = '#3b82f6'; ctx.fill(); ctx.beginPath(); ctx.arc(32, 32, 10, 0, 2 * Math.PI); ctx.fillStyle = '#ffffff'; ctx.fill(); const link = document.querySelector("link[rel*='icon']") || document.createElement('link'); link.type = 'image/x-icon'; link.rel = 'shortcut icon'; link.href = canvas.toDataURL(); document.getElementsByTagName('head')[0].appendChild(link); }
        function speakText(text) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.rate = 0.9; window.speechSynthesis.speak(u); }
        function showScreen(id) { document.querySelectorAll('.screen').forEach(el => el.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        function saveSessionState() { localStorage.setItem('fit_step', currentStepIndex); localStorage.setItem('fit_date', new Date().toISOString().split('T')[0]); }
        function checkSavedSession() { const savedDate = localStorage.getItem('fit_date'); const savedStep = localStorage.getItem('fit_step'); const today = new Date().toISOString().split('T')[0]; if (savedDate === today && savedStep && parseInt(savedStep) > 0) { const btn = document.getElementById('btnResumeSession'); document.getElementById('resumeBanner').classList.remove('hidden'); btn.onclick = () => { startGeneratedWorkout(parseInt(savedStep)); document.getElementById('resumeBanner').classList.add('hidden'); }; } }

        function nextStep() { clearInterval(timerInterval); isTimerRunning = false; timeRemaining = 0; window.speechSynthesis.cancel(); if (currentStepIndex < workoutSteps.length - 1) { currentStepIndex++; renderStep(); } else { localStorage.removeItem('fit_step'); isSessionActive = false; showScreen('viewComplete'); updateFavicon('idle'); } }
        function prevStep() { clearInterval(timerInterval); isTimerRunning = false; timeRemaining = 0; window.speechSynthesis.cancel(); if (currentStepIndex > 0) { currentStepIndex--; renderStep(); } }

    </script>
</body>
