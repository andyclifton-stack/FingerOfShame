<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Finger Game Hub</title>

    <meta name="theme-color" content="#07121f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Finger Hub">
    <link rel="manifest" href="hub-manifest.json">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="hub.css">

    <script>
        const iconLink = document.createElement("link");
        iconLink.rel = "icon";
        iconLink.href = "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2307121f'/><text x='50' y='62' font-size='48' text-anchor='middle' fill='%23e2e8f0' font-family='Arial'>FG</text></svg>";
        document.head.appendChild(iconLink);
    </script>
</head>
<body>
    <div class="hub-shell">
        <header class="hub-header">
            <p class="kicker">Finger Universe</p>
            <h1>Finger Game Hub</h1>
            <p class="subtitle">One launchpad for every game and app. Fast on mobile, clean on desktop, built to keep growing.</p>
            <div class="header-actions">
                <button id="install-btn" class="btn btn-install" type="button" hidden>Install App</button>
                <button id="share-btn" class="btn btn-secondary" type="button">Share Hub</button>
            </div>
        </header>

        <main class="hub-main">
            <section id="featured-panel" class="featured-panel" aria-live="polite"></section>

            <section class="controls" aria-label="Hub controls">
                <label class="search-wrap">
                    <span class="label">Search</span>
                    <input id="search-input" type="search" placeholder="Search games, apps, and tags" autocomplete="off">
                </label>

                <div class="control-row">
                    <div class="filter-group" role="tablist" aria-label="Filter entries">
                        <button class="filter-btn is-active" data-filter="all" type="button">All</button>
                        <button class="filter-btn" data-filter="game" type="button">Games</button>
                        <button class="filter-btn" data-filter="app" type="button">Apps</button>
                        <button class="filter-btn" data-filter="locked" type="button">Locked</button>
                    </div>

                    <label class="sort-wrap">
                        <span class="label">Sort</span>
                        <select id="sort-select">
                            <option value="featured">Featured</option>
                            <option value="recent">Recently Played</option>
                            <option value="az">A to Z</option>
                        </select>
                    </label>
                </div>

                <div class="stats-row" id="stats-row">
                    <span class="chip"><strong id="visible-count">0</strong> visible</span>
                    <span class="chip"><strong id="game-count">0</strong> games</span>
                    <span class="chip"><strong id="app-count">0</strong> apps</span>
                </div>
            </section>

            <section id="hub-grid" class="hub-grid" aria-live="polite"></section>
            <p id="empty-state" class="empty-state" hidden>No entries match your current filter. Try clearing search or switching tabs.</p>
        </main>

        <footer class="hub-footer">
            <div class="footer-actions">
                <button id="whatsapp-btn" class="btn btn-social btn-whatsapp" type="button">Share on WhatsApp</button>
                <button id="facebook-btn" class="btn btn-social btn-facebook" type="button">Share on Facebook</button>
            </div>
            <p class="copyright">Finger Game <span id="year"></span></p>
        </footer>
    </div>

    <script src="hub.js" defer></script>
</body>
</html>
